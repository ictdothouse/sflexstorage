<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galleries | PhotoVault</title>
    
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/gallery.css">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .page-header {
            padding: var(--space-12) 0 var(--space-8);
            margin-top: 80px; /* Header offset */
            border-bottom: 1px solid var(--border-subtle);
            background: var(--bg-surface);
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="site-header">
        <div class="container">
            <a href="/" class="logo">
                <i data-lucide="aperture" class="logo-icon"></i>
                PhotoVault
            </a>
            
            <nav class="nav-links">
                <a href="/gallery" class="active">Discover</a>
                <a href="/subscription">Pricing</a>
                
                <div class="guest-links flex gap-4 items-center">
                    <a href="/login" class="btn btn-ghost">Log In</a>
                    <a href="/register" class="btn btn-primary">Sign Up</a>
                </div>
                
                <div class="auth-links flex gap-6 items-center hidden">
                    <a href="/cart" class="cart-icon" style="position: relative;">
                        <i data-lucide="shopping-cart"></i>
                        <span class="cart-count hidden" style="position: absolute; top: -8px; right: -12px; background: var(--accent-danger); color: white; font-size: 10px; padding: 2px 6px; border-radius: 10px; font-weight: bold;">0</span>
                    </a>
                    <a href="/admin/" class="admin-links hidden badge badge-gold">Admin</a>
                    <a href="/account" class="flex items-center gap-2">
                        <i data-lucide="user-circle"></i>
                        <span class="user-name-display">Account</span>
                    </a>
                </div>
            </nav>
        </div>
    </header>

    <main>
        <div class="page-header">
            <div class="container text-center">
                <h1 id="gallery-title">Discover Collections</h1>
                <p id="gallery-desc" class="text-muted" style="max-width: 600px; margin: 0 auto;">Browse our premium collections of high-resolution stock photography.</p>
            </div>
        </div>

        <div class="container py-12">
            <!-- Filter & Controls -->
            <div class="filter-bar">
                <form id="search-form" action="/search" method="GET" class="search-input-wrapper">
                    <i data-lucide="search"></i>
                    <input type="text" name="q" class="search-input" placeholder="Search within gallery...">
                </form>
                
                <div class="layout-toggles">
                    <button class="layout-btn active" data-layout="grid" title="Grid View"><i data-lucide="grid"></i></button>
                    <button class="layout-btn" data-layout="masonry" title="Masonry View"><i data-lucide="layout-dashboard"></i></button>
                    <button class="layout-btn" data-layout="mosaic" title="Mosaic View"><i data-lucide="layout"></i></button>
                </div>
            </div>

            <!-- Gallery Container -->
            <div class="gallery-container layout-grid" id="gallery-container">
                <div class="glass-panel text-center py-12 w-full" style="grid-column: 1 / -1;">
                    <i data-lucide="loader-2" class="spin"></i> Loading photos...
                </div>
            </div>

            <!-- Load More -->
            <div class="load-more-container hidden" id="load-more-container">
                <button class="btn btn-secondary" id="load-more-btn">Load More</button>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="site-footer">
        <div class="container text-center">
            <p class="text-muted">© 2024 PhotoVault. All rights reserved.</p>
        </div>
    </footer>

    <script src="/js/utils.js?v=4"></script>
    <script src="/js/app.js?v=4"></script>
    <script src="/js/gallery.js?v=4"></script>
</body>
</html>
