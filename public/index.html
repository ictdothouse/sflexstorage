<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhotoVault</title>
    
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/components.css">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        /* CMS Block Styles */
        .cms-hero {
            min-height: 80vh;
            display: flex;
            align-items: center;
            position: relative;
            overflow: hidden;
            padding-top: 80px;
        }
        
        .cms-hero-bg {
            position: absolute;
            inset: 0;
            z-index: 0;
            background: 
                radial-gradient(circle at 80% 20%, rgba(124, 58, 237, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 20% 80%, rgba(6, 182, 212, 0.15) 0%, transparent 40%);
        }
        
        .cms-hero-content {
            position: relative;
            z-index: 1;
            text-align: center;
            max-width: 800px;
            margin: 0 auto;
        }

        .cms-hero-search {
            margin-top: var(--space-8);
            position: relative;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .cms-hero-search input {
            width: 100%;
            padding: 20px 24px 20px 60px;
            border-radius: var(--radius-full);
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-strong);
            color: white;
            font-size: 1.1rem;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .cms-hero-search input:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 30px rgba(124, 58, 237, 0.2);
            background: rgba(255, 255, 255, 0.1);
        }

        .cms-hero-search i {
            position: absolute;
            left: 24px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .cms-hero-search .btn-search {
            position: absolute;
            right: 8px;
            top: 8px;
            bottom: 8px;
            padding: 0 24px;
            border-radius: var(--radius-full);
        }

        .cms-stats {
            background: var(--bg-surface);
            padding: var(--space-12) 0;
            border-top: 1px solid var(--border-subtle);
            border-bottom: 1px solid var(--border-subtle);
        }

        .cms-stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: var(--space-8);
            text-align: center;
        }
        
        .cms-stat-item h3 {
            font-size: 3rem;
            margin-bottom: var(--space-2);
            background: var(--gradient-brand);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .cms-gallery {
            padding: var(--space-16) 0;
        }

        .cms-gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: var(--space-6);
            margin-top: var(--space-8);
        }

        .cms-gallery-card {
            position: relative;
            border-radius: var(--radius-xl);
            overflow: hidden;
            aspect-ratio: 16/10;
            background: var(--bg-elevated);
            cursor: pointer;
        }

        .cms-gallery-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .cms-gallery-card:hover img {
            transform: scale(1.05);
        }

        .cms-gallery-card-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.5) 50%, transparent 100%);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: var(--space-6);
            color: #ffffff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        .cms-text-block {
            padding: var(--space-16) 0;
            max-width: 800px;
            margin: 0 auto;
            line-height: 1.8;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <div id="app-header"></div>

    <main id="cms-root">
        <!-- Dynamic CMS Content Rendered Here -->
        <div class="glass-panel text-center py-12" style="margin: 100px auto; max-width: 400px;">
            <i data-lucide="loader-2" class="spin"></i> Loading page...
        </div>
    </main>

    <!-- Footer -->
    <footer class="site-footer">
        <div class="container text-center">
            <div class="logo justify-center mb-8">
                <i data-lucide="aperture" class="logo-icon"></i>
                <span id="site-title-footer"></span>
            </div>
            <p class="text-muted" id="footer-text"></p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="/js/utils.js?v=4"></script>
    <script src="/js/app.js?v=4"></script>
    <script src="/js/page-renderer.js?v=4"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const renderer = new PageRenderer();
            
            // If URL has ?slug=xyz, load that, else load home
            const params = new URLSearchParams(window.location.search);
            const slug = params.get('slug') || 'home';
            
            renderer.render(slug);
        });
    </script>
</body>
</html>
