<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Results | PhotoVault</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/gallery.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .search-header {
            padding: var(--space-8) 0;
            margin-top: 80px;
            background: var(--bg-surface);
            border-bottom: 1px solid var(--border-subtle);
        }
        .main-search-input {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            position: relative;
        }
        .main-search-input input {
            width: 100%;
            padding: 20px 24px 20px 60px;
            border-radius: var(--radius-full);
            background: var(--bg-elevated);
            border: 1px solid var(--border-strong);
            color: white;
            font-size: 1.25rem;
        }
        .main-search-input i {
            position: absolute;
            left: 24px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            width: 24px; height: 24px;
        }
        .filters-sidebar {
            width: 280px;
            flex-shrink: 0;
        }
        .search-layout {
            display: flex;
            gap: var(--space-8);
            margin-top: var(--space-8);
            align-items: flex-start;
        }
        @media (max-width: 900px) {
            .search-layout { flex-direction: column; }
            .filters-sidebar { width: 100%; }
        }
        .filter-group {
            margin-bottom: var(--space-6);
        }
        .filter-group h4 {
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: var(--space-3);
        }
    </style>
</head>
<body>
    <div id="app-header"></div>

    <main>
        <div class="search-header">
            <div class="container">
                <form id="search-form" class="main-search-input">
                    <i data-lucide="search"></i>
                    <input type="text" id="search-q" name="q" placeholder="Search for photos, events, or people (e.g. Ronaldo)...">
                </form>
                <div class="text-center mt-4">
                    <p class="text-muted" id="search-stats">Enter a keyword to search</p>
                </div>
            </div>
        </div>

        <div class="container">
            <div class="search-layout">
                <!-- Filters Sidebar -->
                <aside class="filters-sidebar glass-panel">
                    <form id="filter-form">
                        <div class="filter-group">
                            <h4>Sort By</h4>
                            <select name="sort" class="form-control" id="filter-sort">
                                <option value="relevance">Most Relevant</option>
                                <option value="newest">Newest First</option>
                                <option value="popular">Most Popular</option>
                                <option value="price_low">Price: Low to High</option>
                                <option value="price_high">Price: High to Low</option>
                            </select>
                        </div>
                        
                        <div class="filter-group">
                            <h4>Orientation</h4>
                            <select name="orientation" class="form-control" id="filter-orientation">
                                <option value="">Any</option>
                                <option value="landscape">Landscape</option>
                                <option value="portrait">Portrait</option>
                                <option value="square">Square</option>
                            </select>
                        </div>

                        <div class="filter-group">
                            <h4>Collection</h4>
                            <select name="gallery_id" class="form-control" id="filter-gallery">
                                <option value="">All Collections</option>
                            </select>
                        </div>

                        <button type="submit" class="btn btn-secondary" style="width: 100%;">Apply Filters</button>
                    </form>
                </aside>

                <!-- Results -->
                <div style="flex: 1;">
                    <div class="gallery-container layout-grid" id="results-container">
                        <!-- Results injected here -->
                    </div>
                    <div class="load-more-container hidden" id="load-more-container">
                        <button class="btn btn-secondary" id="load-more-btn">Load More Results</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="/js/utils.js"></script>
    <script src="/js/app.js"></script>
    <script src="/js/search.js"></script>
</body>
</html>
